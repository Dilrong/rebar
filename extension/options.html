<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REBAR Clipper Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <h1>REBAR Clipper Settings</h1>

      <label>
        API Base URL
        <input id="apiBaseUrl" type="text" placeholder="https://rebar.vercel.app" />
      </label>

      <label>
        API Key (optional)
        <input id="apiKey" type="password" placeholder="Supabase access token" />
      </label>

      <label>
        Default Tags (comma separated)
        <input id="defaultTags" type="text" placeholder="web,highlight" />
      </label>

      <label class="checkbox-row">
        <input id="enableDomainTags" type="checkbox" />
        Enable domain-based auto tags in preview
      </label>

      <p class="status">
        REBAR Clipper saves directly to REBAR API. Keep API Key empty to use login session when available.
      </p>

      <button id="save" type="button">Save</button>
      <p id="status" class="status" role="status" aria-live="polite">Ready</p>
    </main>
    <script src="options.js" type="module"></script>
  </body>
</html>
