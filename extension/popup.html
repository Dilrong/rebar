<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBAR Clipper</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <main class="popup">
    <h1>REBAR <span class="accent">_</span></h1>
    <p class="hint" data-i18n="ext.hint">Clip selected text or full articles directly into REBAR.</p>

    <div id="loginMessage" class="login-message hidden">
      <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <p data-i18n="ext.loginReq">Login required to save clips.</p>
      <button id="goToLogin" type="button" class="button-link" data-i18n="ext.loginBtn">Sign In to REBAR</button>
    </div>

    <div id="actions" class="actions hidden">
      <button id="saveHighlight" type="button" class="primary" data-i18n="ext.highlightBtn">Clip Selection</button>
      <button id="saveArticle" type="button" data-i18n="ext.articleBtn">Clip Full Article</button>
    </div>

    <div class="status-bar">
      <p id="status" class="status" role="status" aria-live="polite" data-i18n="ext.status.ready">Ready</p>
      <a href="options.html" target="_blank" rel="noreferrer" class="settings-link" data-i18n="ext.openSettings">Settings</a>
    </div>
  </main>

  <script src="popup.js" type="module"></script>
</body>

</html>
